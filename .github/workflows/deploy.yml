name: Deploy Why Hire Me

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy frontend to S3
        run: |
          aws s3 cp index.html s3://why-hire-me-kbellamy-787548303162-us-east-1-an/index.html
          aws s3 sync images/ s3://why-hire-me-kbellamy-787548303162-us-east-1-an/images/

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id E3FFDHQYYA95LK --paths "/*"

      - name: Update pitch Lambda
        run: |
          cp why_pitch.py lambda_function.py
          zip pitch.zip lambda_function.py
          aws lambda update-function-code --function-name why-hire-me-pitch --zip-file fileb://pitch.zip
          rm lambda_function.py pitch.zip

      - name: Update story Lambda
        run: |
          cp story_handler.py lambda_function.py
          zip story.zip lambda_function.py
          aws lambda update-function-code --function-name why-hire-me-story --zip-file fileb://story.zip
          rm lambda_function.py story.zip

      - name: Update project Lambda
        run: |
          cp project_handler.py lambda_function.py
          zip project.zip lambda_function.py
          aws lambda update-function-code --function-name why-hire-me-project --zip-file fileb://project.zip
          rm lambda_function.py project.zip

      - name: Update contact Lambda
        run: |
          cp contact_handler.py lambda_function.py
          zip contact.zip lambda_function.py
          aws lambda update-function-code --function-name why-hire-me-contact --zip-file fileb://contact.zip
          rm lambda_function.py contact.zip